function icon(name, size=16, stroke='currentColor', fill='none', strokeWidth=1.5) {
  const d = Icons[name] || '';
  const paths = d.split(' M ').map((p,i) => i===0 ? p : 'M '+p);
  const pathsHtml = paths.map(p => `<path d="${p}"/>`).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">${pathsHtml}</svg>`;
}

// ─── FORMULA ENGINE ───────────────────────────────────────────────────────────
const ROWS = 50, COLS = 26;

function colIndexToLetter(idx) {
  let s = ''; idx += 1;
  while (idx > 0) { let r = (idx-1)%26; s = String.fromCharCode(65+r)+s; idx = Math.floor((idx-1)/26); }
  return s;
}
function cellId(row, col) { return `${colIndexToLetter(col)}${row+1}`; }
function parseRef(ref) {
  const m = ref.match(/^([A-Z]+)(\d+)$/i);
  if (!m) return null;
  let col = 0;
  for (const c of m[1].toUpperCase()) col = col*26 + c.charCodeAt(0)-64;
  return { row: parseInt(m[2])-1, col: col-1 };
}
function evaluateFormula(formula, cells, depth=0) {
  if (depth > 10) return '#CIRC!';
  const expr = formula.slice(1).trim();
  const getVal = (ref) => {
    const pos = parseRef(ref);
    if (!pos) return 0;
    const v = cells[pos.row]?.[pos.col] ?? '';
    if (typeof v === 'string' && v.startsWith('=')) return evaluateFormula(v, cells, depth+1);
    const n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  };
  const expandRange = (r1, r2) => {
    const p1 = parseRef(r1), p2 = parseRef(r2);
    if (!p1 || !p2) return [];
    const vals = [];
    for (let r = Math.min(p1.row,p2.row); r<=Math.max(p1.row,p2.row); r++)
      for (let c = Math.min(p1.col,p2.col); c<=Math.max(p1.col,p2.col); c++)
        vals.push(getVal(cellId(r,c)));
    return vals;
  };
  try {
    const fnMatch = expr.match(/^(SUM|AVERAGE|AVG|MIN|MAX|COUNT|IF|COUNTA|ROUND)\s*\((.+)\)$/i);
    if (fnMatch) {
      const fn = fnMatch[1].toUpperCase();
      const args = fnMatch[2];
      if (fn === 'IF') {
        const parts = args.split(',');
        if (parts.length < 2) return '#ARG!';
        const cond = evaluateExpr(parts[0].trim(), cells, depth);
        return cond ? evaluateExpr(parts[1].trim(), cells, depth) : (parts[2] ? evaluateExpr(parts[2].trim(), cells, depth) : 0);
      }
      if (fn === 'ROUND') {
        const parts = args.split(',');
        const v = evaluateExpr(parts[0].trim(), cells, depth);
        const dec = parts[1] ? parseInt(parts[1].trim()) : 0;
        return Math.round(v * Math.pow(10,dec)) / Math.pow(10,dec);
      }
      const vals = [];
      const rangeReg = /([A-Z]+\d+):([A-Z]+\d+)/gi;
      let argsCopy = args;
      let rm;
      const usedRanges = [];
      while ((rm = rangeReg.exec(args)) !== null) {
        expandRange(rm[1], rm[2]).forEach(v => vals.push(v));
        usedRanges.push(rm[0]);
      }
      let processed = args;
      for (const ur of usedRanges) processed = processed.replace(ur, '');
      const remaining = processed.replace(/[^A-Za-z0-9,.\s]/g,'');
      for (const part of remaining.split(',')) {
        const t = part.trim();
        if (!t) continue;
        if (/^[A-Z]+\d+$/i.test(t)) vals.push(getVal(t));
        else { const n = parseFloat(t); if (!isNaN(n)) vals.push(n); }
      }
      const nums = vals.filter(v => !isNaN(v));
      if (fn==='SUM') return nums.reduce((a,b)=>a+b,0);
      if (fn==='AVERAGE'||fn==='AVG') return nums.length ? nums.reduce((a,b)=>a+b,0)/nums.length : 0;
      if (fn==='MIN') return nums.length ? Math.min(...nums) : 0;
      if (fn==='MAX') return nums.length ? Math.max(...nums) : 0;
      if (fn==='COUNT') return nums.length;
      if (fn==='COUNTA') return vals.filter(v=>v!==''&&v!==null&&v!==undefined).length;
    }
    return evaluateExpr(expr, cells, depth);
  } catch { return '#ERR!'; }
}
function evaluateExpr(expr, cells, depth=0) {
  let e = expr.replace(/[A-Z]+\d+/gi, (ref) => {
    const pos = parseRef(ref);
    if (!pos) return '0';
    const v = cells[pos.row]?.[pos.col] ?? 0;
    if (typeof v === 'string' && v.startsWith('=')) return evaluateFormula(v, cells, depth+1) || 0;
    return isNaN(parseFloat(v)) ? `"${v}"` : parseFloat(v);
  });
  return Function('"use strict"; return ('+e+')')();
}

function getSheet() { return state.sheets[state.activeSheet]; }
function getCells() { return getSheet().data; }
function getFmt() { return getSheet().fmt; }

function getDisplayVal(r, c) {
  const cells = getCells();
  const v = cells[r]?.[c] ?? '';
  if (typeof v === 'string' && v.startsWith('=')) {
    const res = evaluateFormula(v, cells);
    if (typeof res === 'number') return isNaN(res) ? '#NAN!' : Number.isFinite(res) ? (Math.round(res*1e10)/1e10).toString() : '#INF!';
    return res?.toString() ?? '';
  }
  return v?.toString() ?? '';
}

function notify(msg, type='info') {
  state.notification = { msg, type };
  render();
  clearTimeout(state._notifyTimer);
  state._notifyTimer = setTimeout(() => { state.notification = null; render(); }, 2500);
}

function pushHistory(data) {
  state.history = [...state.history.slice(-30), JSON.stringify(data)];
  state.future = [];
}
function updateCells(newData) {
  pushHistory(getCells());
  state.sheets = state.sheets.map((sh,i) => i===state.activeSheet ? {...sh, data:newData} : sh);
}
function updateFmt(newFmt) {
  state.sheets = state.sheets.map((sh,i) => i===state.activeSheet ? {...sh, fmt:newFmt} : sh);
}

function commitEdit() {
  if (state.editCell === null) return;
  const { row, col } = state.editCell;
  const cells = getCells();
  const newData = cells.map(r=>[...r]);
  newData[row][col] = state.editVal;
  updateCells(newData);
  state.editCell = null;
  state.editVal = '';
}

function startEdit(row, col) {
  commitEdit();
  state.selected = { row, col };
  const v = getCells()[row]?.[col] ?? '';
  state.editCell = { row, col };
  state.editVal = v;
  state.formulaBar = v;
}

function handleCopy() {
  const cells = getCells();
  const r1=state.selection?.r1??state.selected.row, c1=state.selection?.c1??state.selected.col;
  const r2=state.selection?.r2??state.selected.row, c2=state.selection?.c2??state.selected.col;
  const data=[];
  for(let r=r1;r<=r2;r++){const row=[];for(let c=c1;c<=c2;c++)row.push(cells[r]?.[c]??'');data.push(row);}
  state.clipboard = { data, r1, c1 };
  notify('Copied to clipboard');
}
function handlePaste() {
  if(!state.clipboard) return;
  const cells = getCells();
  const newData = cells.map(r=>[...r]);
  state.clipboard.data.forEach((row,dr)=>row.forEach((val,dc)=>{const r=state.selected.row+dr,c=state.selected.col+dc;if(r<ROWS&&c<COLS)newData[r][c]=val;}));
  updateCells(newData); notify('Pasted');
}
function handleCut() {
  handleCopy();
  const cells = getCells();
  const newData = cells.map(r=>[...r]);
  newData[state.selected.row][state.selected.col]='';
  updateCells(newData);
}
function handleUndo() {
  if(!state.history.length) return;
  const prev = JSON.parse(state.history[state.history.length-1]);
  state.future = [JSON.stringify(getCells()), ...state.future];
  state.history = state.history.slice(0,-1);
  state.sheets = state.sheets.map((sh,i)=>i===state.activeSheet?{...sh,data:prev}:sh);
}
function handleRedo() {
  if(!state.future.length) return;
  const next = JSON.parse(state.future[0]);
  state.history = [...state.history, JSON.stringify(getCells())];
  state.future = state.future.slice(1);
  state.sheets = state.sheets.map((sh,i)=>i===state.activeSheet?{...sh,data:next}:sh);
}
function handleSave() {
  localStorage.setItem('ibcalc_sheets', JSON.stringify(state.sheets));
  notify('Saved to browser storage ✓','success');
}
function handleLoad() {
  const saved = localStorage.getItem('ibcalc_sheets');
  if(saved){state.sheets=JSON.parse(saved);notify('Loaded saved data ✓','success');}
  else notify('No saved data found');
}
function handleExportCSV() {
  const cells = getCells();
  const csv = cells.map(row=>row.map(c=>`"${(c??'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${getSheet().name}.csv`;a.click();
  notify('Exported as CSV ✓','success');
}

function applyFmt(prop, val) {
  const fmt = getFmt();
  const newFmt = fmt.map(r=>r.map(f=>f?{...f}:null));
  const r1=state.selection?.r1??state.selected.row, c1=state.selection?.c1??state.selected.col;
  const r2=state.selection?.r2??state.selected.row, c2=state.selection?.c2??state.selected.col;
  for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++){if(!newFmt[r][c])newFmt[r][c]={};newFmt[r][c][prop]=val;}
  updateFmt(newFmt);
}

function addSheet() {
  const id=Date.now(),name=`Sheet${state.sheets.length+1}`;
  state.sheets=[...state.sheets,{id,name,data:emptyGrid(),fmt:emptyFmt()}];
  state.activeSheet=state.sheets.length-1;
}
function deleteSheet(idx) {
  if(state.sheets.length===1){notify('Cannot delete the only sheet');return;}
  state.sheets=state.sheets.filter((_,i)=>i!==idx);
  state.activeSheet=Math.max(0,idx-1);
}
function loadTemplate(key) {
  const tpl=TEMPLATES[key]; if(!tpl) return;
  state.sheets=state.sheets.map((sh,i)=>i===state.activeSheet?{...sh,data:tpl.data.map(r=>[...r]),fmt:emptyFmt()}:sh);
  state.view='spreadsheet';
  notify(`Loaded template: ${tpl.name}`,'success');
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
function s(obj) {
  return Object.entries(obj).map(([k,v])=>`${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';');
}

function renderChart() {
  const t = th();
  const cells=getCells();
  const r1=state.selection?.r1??state.selected.row, c1=state.selection?.c1??state.selected.col;
  const r2=state.selection?.r2??Math.min(state.selected.row+5,ROWS-1), c2=state.selection?.c2??state.selected.col;
  const chartData=[];
  for(let r=r1;r<=r2;r++){
    const label=(cells[r]?.[c1]??`Row ${r+1}`).toString();
    const val=parseFloat(getDisplayVal(r,c1+1))||0;
    chartData.push({label,val});
  }
  const max=Math.max(...chartData.map(d=>d.val),1);
  const w=340,h=200,pad=40;
  if(state.chartType==='bar'){
    const bw=(w-pad*2)/chartData.length-4;
    const bars=chartData.map((d,i)=>{
      const bh=((d.val/max)*(h-pad-30));
      const x=pad+i*((w-pad*2)/chartData.length)+2, y=h-pad-bh;
      return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${t.accent}" opacity="0.8" rx="2"/>
              <text x="${x+bw/2}" y="${h-5}" text-anchor="middle" font-size="9" fill="${t.muted}">${d.label.slice(0,8)}</text>
              <text x="${x+bw/2}" y="${y-3}" text-anchor="middle" font-size="8" fill="${t.text}">${d.val}</text>`;
    }).join('');
    return `<svg width="${w}" height="${h}" style="background:${t.surface};border-radius:8px;border:1px solid ${t.border}">${bars}</svg>`;
  }
  if(state.chartType==='line'){
    const pts=chartData.map((d,i)=>({x:pad+i*(w-pad*2)/Math.max(chartData.length-1,1), y:h-pad-(d.val/max)*(h-pad-30)}));
    const path=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
    const circles=pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${t.accent}"/>`).join('');
    const labels=chartData.map((d,i)=>`<text x="${pts[i].x}" y="${h-5}" text-anchor="middle" font-size="9" fill="${t.muted}">${d.label.slice(0,8)}</text>`).join('');
    return `<svg width="${w}" height="${h}" style="background:${t.surface};border-radius:8px;border:1px solid ${t.border}"><path d="${path}" fill="none" stroke="${t.accent}" stroke-width="2"/>${circles}${labels}</svg>`;
  }
  if(state.chartType==='pie'){
    const total=chartData.reduce((a,b)=>a+b.val,0)||1;
    const colors=['#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6','#8b5cf6'];
    let angle=-Math.PI/2; const cx=w/2,cy=h/2,r=Math.min(w,h)/2-20;
    const slices=chartData.map((d,i)=>{
      const slice=(d.val/total)*2*Math.PI;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
      const large=slice>Math.PI?1:0;
      const p=`M${cx},${cy} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2}Z`;
      angle+=slice;
      return `<path d="${p}" fill="${colors[i%colors.length]}" opacity="0.85" stroke="${t.surface}" stroke-width="1"/>`;
    }).join('');
    const legend=chartData.map((d,i)=>`<rect x="${w-80}" y="${10+i*16}" width="10" height="10" fill="${colors[i%colors.length]}" rx="2"/><text x="${w-66}" y="${20+i*16}" font-size="9" fill="${t.text}">${d.label.slice(0,8)}</text>`).join('');
    return `<svg width="${w}" height="${h}" style="background:${t.surface};border-radius:8px;border:1px solid ${t.border}">${slices}${legend}</svg>`;
  }
  return '';
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
function handleKeyDown(e) {
  if(state.editCell!==null) {
    if(e.key==='Enter'){commitEdit();state.selected={...state.selected,row:Math.min(state.selected.row+1,ROWS-1)};render();}
    else if(e.key==='Escape'){state.editCell=null;state.editVal='';render();}
    else if(e.key==='Tab'){e.preventDefault();commitEdit();state.selected={...state.selected,col:Math.min(state.selected.col+1,COLS-1)};render();}
    return;
  }
  const mv=(dr,dc)=>{e.preventDefault();state.selected={row:Math.max(0,Math.min(ROWS-1,state.selected.row+dr)),col:Math.max(0,Math.min(COLS-1,state.selected.col+dc))};state.selection=null;render();};
  if(e.key==='ArrowUp') mv(-1,0);
  else if(e.key==='ArrowDown') mv(1,0);
  else if(e.key==='ArrowLeft') mv(0,-1);
  else if(e.key==='ArrowRight') mv(0,1);
  else if(e.key==='Enter'){startEdit(state.selected.row,state.selected.col);render();}
  else if(e.key==='Delete'||e.key==='Backspace'){const nd=getCells().map(r=>[...r]);nd[state.selected.row][state.selected.col]='';updateCells(nd);render();}
  else if(e.ctrlKey||e.metaKey){
    if(e.key==='c'){handleCopy();render();}
    else if(e.key==='v'){handlePaste();render();}
    else if(e.key==='z'){handleUndo();render();}
    else if(e.key==='y'){handleRedo();render();}
    else if(e.key==='s'){e.preventDefault();handleSave();}
  }
  else if(!e.ctrlKey&&!e.metaKey&&e.key.length===1){startEdit(state.selected.row,state.selected.col);state.editVal=e.key;render();}
}

function handleImportCSV(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const lines=ev.target.result.split('\n');
    const newData=emptyGrid();
    lines.forEach((line,r)=>{if(r>=ROWS)return;const cols=line.split(',');cols.forEach((c,ci)=>{if(ci<COLS)newData[r][ci]=c.replace(/^"|"$/g,'').trim();});});
    updateCells(newData);notify('CSV imported ✓','success');render();
  };
  reader.readAsText(file);
}

            ${['Name','Email','Reference','Date','Status','Actions'].map(h=>`<th style="${s({padding:'12px 16px',textAlign:'left',fontSize:'12px',fontWeight:'700',color:t.muted,textTransform:'uppercase',letterSpacing:'.05em'})}">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${p.map(pay=>`
            <tr style="border-top:1px solid ${t.border}">
              <td style="${s({padding:'12px 16px',color:t.text,fontSize:'14px',fontWeight:'600'})}">${pay.name}</td>
              <td style="${s({padding:'12px 16px',color:t.muted,fontSize:'13px'})}">${pay.email}</td>
              <td style="${s({padding:'12px 16px',color:t.muted,fontSize:'12px',fontFamily:'monospace'})}">${pay.ref}</td>
              <td style="${s({padding:'12px 16px',color:t.muted,fontSize:'13px'})}">${pay.date}</td>
              <td style="padding:12px 16px">
                <span style="${s({padding:'3px 10px',borderRadius:'99px',fontSize:'12px',fontWeight:'700',background:pay.status==='approved'?'#10b98122':pay.status==='rejected'?'#ef444422':'#f59e0b22',color:pay.status==='approved'?'#10b981':pay.status==='rejected'?'#ef4444':'#f59e0b'})}">${pay.status.toUpperCase()}</span>
              </td>
              <td style="padding:12px 16px">
                <button onclick="state.payments=state.payments.map(x=>x.id===${pay.id}?{...x,status:'approved'}:x);if('${pay.email}'===state.paymentForm.email)state.isPremium=true;render();" style="padding:4px 12px;border-radius:6px;background:#10b98122;color:#10b981;border:none;cursor:pointer;font-size:12px;font-weight:700;margin-right:6px">Approve</button>
                <button onclick="state.payments=state.payments.map(x=>x.id===${pay.id}?{...x,status:'rejected'}:x);render();" style="padding:4px 12px;border-radius:6px;background:#ef444422;color:#ef4444;border:none;cursor:pointer;font-size:12px;font-weight:700">Reject</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      ${p.length===0?`<div style="padding:40px;text-align:center;color:${t.muted}">No payments yet.</div>`:''}
    </div>
  </div>`;
}

// ─── SPREADSHEET ──────────────────────────────────────────────────────────────
function renderSpreadsheet(t, cells, fmt, sheet) {
  // Menu bar
  const menus = {
    File:[
      {label:'New Spreadsheet',icon:'new',action:`state.sheets=[{id:1,name:'Sheet1',data:emptyGrid(),fmt:emptyFmt()}];state.activeSheet=0;state.history=[];state.future=[];state.activeMenu=null;render();`},
      {label:'Save',icon:'save',action:`handleSave();state.activeMenu=null;render();`},
      {label:'Load Saved',icon:'open',action:`handleLoad();state.activeMenu=null;render();`},
      {label:'Export CSV',icon:'download',action:`handleExportCSV();state.activeMenu=null;render();`},
      {label:'Import CSV',icon:'upload',action:`document.getElementById('csv-input').click();state.activeMenu=null;render();`},
      {label:'Templates',icon:'star',action:`state.view='dashboard';state.activeMenu=null;render();`},
    ],
    Edit:[
      {label:'Undo',icon:'undo',action:`handleUndo();state.activeMenu=null;render();`},
      {label:'Redo',icon:'redo',action:`handleRedo();state.activeMenu=null;render();`},
      {label:'Copy',icon:'copy',action:`handleCopy();state.activeMenu=null;render();`},
      {label:'Cut',icon:'cut',action:`handleCut();state.activeMenu=null;render();`},
      {label:'Paste',icon:'paste',action:`handlePaste();state.activeMenu=null;render();`},
      {label:'Delete Cell',icon:'trash',action:`const nd=getCells().map(r=>[...r]);nd[state.selected.row][state.selected.col]='';updateCells(nd);state.activeMenu=null;render();`},
    ],
    View:[
      {label:'Toggle Dark Mode',icon:state.dark?'sun':'moon',action:`state.dark=!state.dark;state.activeMenu=null;render();`},
      {label:'Freeze Row',icon:'freeze',action:`state.frozenRows=state.frozenRows===state.selected.row+1?0:state.selected.row+1;state.activeMenu=null;render();`},
      {label:'Freeze Column',icon:'freeze',action:`state.frozenCols=state.frozenCols===state.selected.col+1?0:state.selected.col+1;state.activeMenu=null;render();`},
    ],
    Insert:[
      {label:'Add Sheet',icon:'plus',action:`addSheet();state.activeMenu=null;render();`},
      {label:'Chart',icon:'chart',action:`if(!state.isPremium){state.view='upgrade';}else{state.showChart=true;}state.activeMenu=null;render();`,premium:true},
    ],
    Format:[
      {label:'Bold',icon:'bold',action:`applyFmt('bold',!(getFmt()[state.selected.row]?.[state.selected.col]?.bold));state.activeMenu=null;render();`},
      {label:'Italic',icon:'italic',action:`applyFmt('italic',!(getFmt()[state.selected.row]?.[state.selected.col]?.italic));state.activeMenu=null;render();`},
      {label:'Underline',icon:'underline',action:`applyFmt('underline',!(getFmt()[state.selected.row]?.[state.selected.col]?.underline));state.activeMenu=null;render();`},
    ],
    Data:[
      {label:'Sort A→Z',icon:'sort',action:`const nd=getCells().map(r=>[...r]);nd.sort((a,b)=>(a[state.selected.col]??'').toString().localeCompare((b[state.selected.col]??'').toString()));updateCells(nd);notify('Sorted A→Z');state.activeMenu=null;render();`},
      {label:'Sort Z→A',icon:'sort',action:`const nd=getCells().map(r=>[...r]);nd.sort((a,b)=>(b[state.selected.col]??'').toString().localeCompare((a[state.selected.col]??'').toString()));updateCells(nd);notify('Sorted Z→A');state.activeMenu=null;render();`},
    ],
    Tools:[
      {label:'Admin Dashboard',icon:'settings',action:`state.view='admin';state.activeMenu=null;render();`},
    ],
    Help:[
      {label:'Keyboard Shortcuts',icon:'info',action:`notify('Ctrl+C Copy | Ctrl+V Paste | Ctrl+Z Undo | Ctrl+S Save | Delete Clear');state.activeMenu=null;render();`},
    ],
  };

  const menuBar = Object.entries(menus).map(([name,items])=>`
    <div style="position:relative">
      <button onclick="state.activeMenu=state.activeMenu==='${name}'?null:'${name}';render();" style="${s({padding:'4px 10px',fontSize:'13px',color:state.activeMenu===name?t.accent:t.text,background:state.activeMenu===name?t.accent+'18':'transparent',border:'none',cursor:'pointer',borderRadius:'6px',fontWeight:'500'})}">${name}</button>
      ${state.activeMenu===name?`
        <div style="${s({position:'absolute',top:'100%',left:'0',minWidth:'200px',background:t.menuBg,border:`1px solid ${t.border}`,borderRadius:'10px',boxShadow:'0 8px 30px #0002',zIndex:'999',padding:'4px 0',marginTop:'2px'})}">
          ${items.map(item=>`
            <button onclick="${item.action}" style="${s({width:'100%',display:'flex',alignItems:'center',gap:'10px',padding:'8px 14px',background:'none',border:'none',color:t.text,cursor:'pointer',fontSize:'13px',textAlign:'left'})}"
              onmouseenter="this.style.background='${t.accent}15'" onmouseleave="this.style.background='none'">
              <span style="color:${t.muted}">${icon(item.icon,14)}</span>
              ${item.label}
              ${item.premium&&!state.isPremium?`<span style="${s({marginLeft:'auto',fontSize:'10px',background:'#f59e0b22',color:'#f59e0b',padding:'2px 6px',borderRadius:'4px',fontWeight:'700'})}">PRO</span>`:''}
            </button>`).join('')}
        </div>`:''}
    </div>`).join('');

  const curFmt = fmt[state.selected.row]?.[state.selected.col] || {};

  // Build the grid
  const colHeaders = Array.from({length:COLS},(_,c)=>`
    <th onclick="state.selection={r1:0,c1:${c},r2:${ROWS-1},c2:${c}};state.selected={row:0,col:${c}};render();"
      style="${s({width:state.colWidths[c]+'px',height:'24px',background:state.selection&&c>=state.selection.c1&&c<=state.selection.c2?t.accent+'22':t.headerBg,border:`1px solid ${t.border}`,fontSize:'11px',fontWeight:'700',color:t.muted,position:'sticky',top:'0',zIndex:'10',cursor:'pointer',userSelect:'none'})}">
      ${colIndexToLetter(c)}
    </th>`).join('');

  const rows = Array.from({length:ROWS},(_,r)=>{
    const isRowSel = state.selection&&r>=state.selection.r1&&r<=state.selection.r2;
    const cells2D = getCells();
    const tds = Array.from({length:COLS},(_,c)=>{
      const isEd = state.editCell?.row===r&&state.editCell?.col===c;
      const isSel = state.selection?r>=state.selection.r1&&r<=state.selection.r2&&c>=state.selection.c1&&c<=state.selection.c2:r===state.selected.row&&c===state.selected.col;
      const isActive = r===state.selected.row&&c===state.selected.col;
      const f = fmt[r]?.[c]||{};
      const dv = isEd ? state.editVal : getDisplayVal(r,c);
      const highlight = state.searchTerm && !isEd && dv.toLowerCase().includes(state.searchTerm.toLowerCase());

      const cellStyle = s({
        width:state.colWidths[c]+'px',
        minWidth:state.colWidths[c]+'px',
        maxWidth:state.colWidths[c]+'px',
        height:state.rowHeights[r]+'px',
        padding:'0 4px',
        border:`1px solid ${isSel?t.selBorder:t.border}`,
        background:isSel?t.selBg:(isActive&&!isEd?t.selBg+'88':(f.bgColor||(highlight?'#fef08a':(r%2===0?t.rowBg:t.altRow)))),
        boxShadow:isActive?`inset 0 0 0 2px ${t.selBorder}`:'none',
        cursor:'cell',
        userSelect:'none',
        position:'relative',
        overflow:'hidden',
        fontWeight:f.bold?'bold':'normal',
        fontStyle:f.italic?'italic':'normal',
        textDecoration:f.underline?'underline':'none',
        color:f.color||t.text,
        fontSize:(f.fontSize||state.fontSize)+'px',
        textAlign:f.align||'left',
      });

      if(isEd) {
        return `<td style="${cellStyle}" onclick="state.selected={row:${r},col:${c}};state.selection=null;state.activeMenu=null;" ondblclick="startEdit(${r},${c});render();">
          <input id="cell-edit-input" value="${(state.editVal||'').replace(/"/g,'&quot;')}"
            oninput="state.editVal=this.value;state.formulaBar=this.value;"
            onblur="commitEdit();render();"
            onkeydown="handleCellInputKey(event,${r},${c})"
            style="${s({width:'100%',height:'100%',border:'none',outline:'none',background:'transparent',fontSize:(f.fontSize||state.fontSize)+'px',fontWeight:f.bold?'bold':'normal',fontStyle:f.italic?'italic':'normal',color:t.accent,padding:'0'})}"/>
        </td>`;
      }
      return `<td style="${cellStyle}"
        onclick="state.selected={row:${r},col:${c}};state.selection=null;state.activeMenu=null;render();"
        ondblclick="startEdit(${r},${c});render();"
        onmousedown="if(event.shiftKey){state.selection={r1:state.selection?.r1??state.selected.row,c1:state.selection?.c1??state.selected.col,r2:${r},c2:${c}};render();}">
        <span style="display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:${state.rowHeights[r]}px">${escHtml(dv)}</span>
      </td>`;
    }).join('');

    return `<tr>
      <td onclick="state.selection={r1:${r},c1:0,r2:${r},c2:${COLS-1}};state.selected={row:${r},col:0};render();"
        style="${s({width:'40px',height:state.rowHeights[r]+'px',background:isRowSel?t.accent+'22':t.headerBg,border:`1px solid ${t.border}`,fontSize:'11px',color:t.muted,textAlign:'center',position:'sticky',left:'0',zIndex:'5',cursor:'pointer',userSelect:'none'})}">${r+1}</td>
      ${tds}
    </tr>`;
  }).join('');

  const sheetTabs = state.sheets.map((sh,i)=>`
    <div style="${s({display:'flex',alignItems:'center',gap:'4px',padding:'0 12px',height:'28px',borderRadius:'6px 6px 0 0',marginRight:'2px',background:i===state.activeSheet?t.surface:'transparent',border:i===state.activeSheet?`1px solid ${t.border}`:'1px solid transparent',cursor:'pointer',fontSize:'13px',color:i===state.activeSheet?t.accent:t.muted,fontWeight:i===state.activeSheet?'700':'400'})}"
      onclick="commitEdit();state.activeSheet=${i};render();">
      ${state.renaming===i?`
        <input id="rename-input" value="${sh.name}"
          oninput="state.renameVal=this.value"
          onblur="state.sheets=state.sheets.map((s,idx)=>idx===${i}?{...s,name:state.renameVal||s.name}:s);state.renaming=null;render();"
          onkeydown="if(event.key==='Enter'){state.sheets=state.sheets.map((s,idx)=>idx===${i}?{...s,name:state.renameVal||s.name}:s);state.renaming=null;render();}"
          style="width:70px;font-size:12px;border:none;outline:none;background:transparent;color:${t.text}"/>`
        :`<span ondblclick="event.stopPropagation();state.renaming=${i};state.renameVal='${sh.name}';render();">${sh.name}</span>`}
      ${state.sheets.length>1?`<button onclick="event.stopPropagation();deleteSheet(${i});render();" style="background:none;border:none;cursor:pointer;color:${t.muted};padding:0;line-height:1;margin-left:4px">${icon('x',12)}</button>`:''}
    </div>`).join('');

  return `
  <div style="${s({display:'flex',flexDirection:'column',height:'calc(100vh - 56px)',overflow:'hidden'})}">
    <!-- Menu Bar -->
    <div style="${s({display:'flex',alignItems:'center',background:t.toolbarBg,borderBottom:`1px solid ${t.border}`,padding:'0 8px',height:'32px',position:'relative',zIndex:'20'})}" onclick="event.target===this&&(state.activeMenu=null,render())">
      ${menuBar}
    </div>
    <!-- Toolbar -->
    <div style="${s({display:'flex',alignItems:'center',gap:'2px',background:t.toolbarBg,borderBottom:`1px solid ${t.border}`,padding:'4px 8px',height:'38px',overflowX:'auto'})}">
      ${toolBtn(t,'new','New',`state.sheets=[{id:1,name:'Sheet1',data:emptyGrid(),fmt:emptyFmt()}];state.activeSheet=0;render();`)}
      ${toolBtn(t,'save','Save (Ctrl+S)',`handleSave();`)}
      ${toolBtn(t,'download','Export CSV',`handleExportCSV();`)}
      <div style="width:1px;height:22px;background:${t.border};margin:0 4px"></div>
      ${toolBtn(t,'undo','Undo (Ctrl+Z)',`handleUndo();render();`)}
      ${toolBtn(t,'redo','Redo (Ctrl+Y)',`handleRedo();render();`)}
      <div style="width:1px;height:22px;background:${t.border};margin:0 4px"></div>
      ${toolBtn(t,'copy','Copy (Ctrl+C)',`handleCopy();render();`)}
      ${toolBtn(t,'paste','Paste (Ctrl+V)',`handlePaste();render();`)}
      ${toolBtn(t,'cut','Cut',`handleCut();render();`)}
      <div style="width:1px;height:22px;background:${t.border};margin:0 4px"></div>
      ${toolBtn(t,'bold','Bold',`applyFmt('bold',!(getFmt()[state.selected.row]?.[state.selected.col]?.bold));render();`,curFmt.bold)}
      ${toolBtn(t,'italic','Italic',`applyFmt('italic',!(getFmt()[state.selected.row]?.[state.selected.col]?.italic));render();`,curFmt.italic)}
      ${toolBtn(t,'underline','Underline',`applyFmt('underline',!(getFmt()[state.selected.row]?.[state.selected.col]?.underline));render();`,curFmt.underline)}
      <div style="width:1px;height:22px;background:${t.border};margin:0 4px"></div>
      ${toolBtn(t,'alignLeft','Align Left',`applyFmt('align','left');render();`)}
      ${toolBtn(t,'alignCenter','Align Center',`applyFmt('align','center');render();`)}
      ${toolBtn(t,'alignRight','Align Right',`applyFmt('align','right');render();`)}
      <div style="width:1px;height:22px;background:${t.border};margin:0 4px"></div>
      <select title="Font size" onchange="state.fontSize=+this.value;applyFmt('fontSize',+this.value);render();"
        style="${s({fontSize:'12px',padding:'2px 4px',borderRadius:'6px',border:`1px solid ${t.border}`,background:t.surface,color:t.text,width:'52px'})}">
        ${[10,11,12,13,14,16,18,20,24].map(sz=>`<option${sz===state.fontSize?' selected':''}>${sz}</option>`).join('')}
      </select>
      <div style="width:1px;height:22px;background:${t.border};margin:0 4px"></div>
      <label title="Cell background color" style="display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:6px;cursor:pointer;color:${t.muted}">
        ${icon('paint',14)} <input type="color" onchange="applyFmt('bgColor',this.value);render();" style="width:20px;height:16px;border:none;padding:0;cursor:pointer"/>
      </label>
      <label title="Text color" style="display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:6px;cursor:pointer;color:${t.muted}">
        <span style="font-size:10px;font-weight:700">A</span><input type="color" onchange="applyFmt('color',this.value);render();" style="width:20px;height:16px;border:none;padding:0;cursor:pointer"/>
      </label>
      <div style="width:1px;height:22px;background:${t.border};margin:0 4px"></div>
      ${toolBtn(t,'sort','Sort A→Z',`const nd=getCells().map(r=>[...r]);nd.sort((a,b)=>(a[state.selected.col]??'').toString().localeCompare((b[state.selected.col]??'').toString()));updateCells(nd);notify('Sorted');render();`)}
      ${toolBtn(t,'chart','Insert Chart'+(state.isPremium?'':' (Premium)'),state.isPremium?`state.showChart=true;render();`:`state.view='upgrade';render();`,false,!state.isPremium)}
      <div style="flex:1"></div>
      <div style="display:flex;align-items:center;gap:6px">
        ${icon('search',14,t.muted)}
        <input value="${state.searchTerm}" oninput="state.searchTerm=this.value;render();" placeholder="Search..."
          style="${s({fontSize:'12px',padding:'3px 8px',borderRadius:'6px',border:`1px solid ${t.border}`,background:t.surface,color:t.text,width:'120px',outline:'none'})}"/>
      </div>
    </div>
    <!-- Formula Bar -->
    <div style="${s({display:'flex',alignItems:'center',gap:'8px',background:t.toolbarBg,borderBottom:`1px solid ${t.border}`,padding:'4px 12px',height:'30px'})}">
      <div style="${s({minWidth:'60px',padding:'2px 10px',borderRadius:'6px',background:t.surface,border:`1px solid ${t.border}`,fontSize:'12px',color:t.accent,fontWeight:'700',textAlign:'center'})}">
        ${cellId(state.selected.row, state.selected.col)}
      </div>
      <div style="color:${t.muted};font-size:16px;font-weight:300">fx</div>
      <input id="formula-bar" value="${escHtml(state.formulaBar)}"
        oninput="state.formulaBar=this.value;if(state.editCell){state.editVal=this.value;}else{startEdit(state.selected.row,state.selected.col);state.editVal=this.value;}"
        onblur="commitEdit();render();"
        style="${s({flex:'1',padding:'2px 10px',borderRadius:'6px',border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:'13px',outline:'none'})}"
        placeholder="Enter value or formula..."/>
    </div>
    <!-- Grid -->
    <div style="${s({flex:'1',overflow:'auto',background:t.gridBg})}" onclick="event.target===this&&(state.activeMenu=null)">
      <table style="border-collapse:collapse;table-layout:fixed">
        <colgroup>
          <col style="width:40px"/>
          ${Array.from({length:COLS},(_,c)=>`<col style="width:${state.colWidths[c]}px"/>`).join('')}
        </colgroup>
        <thead>
          <tr>
            <th style="${s({width:'40px',height:'24px',background:t.headerBg,border:`1px solid ${t.border}`,fontSize:'11px',color:t.muted,position:'sticky',top:'0',zIndex:'10'})}"></th>
            ${colHeaders}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <!-- Sheet Tabs -->
    <div style="${s({display:'flex',alignItems:'center',background:t.toolbarBg,borderTop:`1px solid ${t.border}`,padding:'0 8px',height:'34px',overflowX:'auto'})}">
      ${sheetTabs}
      <button onclick="addSheet();render();" title="Add sheet" style="display:flex;align-items:center;padding:4px 8px;background:none;border:none;cursor:pointer;color:${t.muted};border-radius:6px">
        ${icon('plus',16)}
      </button>
      <div style="margin-left:auto;font-size:12px;color:${t.muted};padding-right:8px">
        ${state.frozenRows>0?`<span style="margin-right:8px;color:${t.accent}">↔ ${state.frozenRows} row(s) frozen</span>`:''}
        ${state.frozenCols>0?`<span style="color:${t.accent}">↕ ${state.frozenCols} col(s) frozen</span>`:''}
      </div>
    </div>
  </div>`;
}

function toolBtn(t, iconName, title, action, active=false, premium=false) {
  return `<button title="${title}" onclick="${action}"
    style="${s({padding:'4px 7px',borderRadius:'6px',border:'none',background:active?t.accent+'33':'transparent',color:active?t.accent:t.muted,cursor:'pointer',display:'flex',alignItems:'center',gap:'4px',position:'relative'})}"
    onmouseenter="this.style.background='${t.accent}22'" onmouseleave="this.style.background='${active?t.accent+'33':'transparent'}'">
    ${icon(iconName,15)}
    ${premium?`<span style="position:absolute;top:0;right:0;width:8px;height:8px;background:#f59e0b;border-radius:50%"></span>`:''}
  </button>`;
}

function handleCellInputKey(e, row, col) {
  if(e.key==='Enter'){e.preventDefault();commitEdit();state.selected={row:Math.min(row+1,ROWS-1),col};render();}
  else if(e.key==='Escape'){state.editCell=null;state.editVal='';render();}
  else if(e.key==='Tab'){e.preventDefault();commitEdit();state.selected={row,col:Math.min(col+1,COLS-1)};render();}
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
render();
</script>
